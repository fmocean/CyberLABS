<ossec_config>

  <client>
    <server>
      <address>YOUR_WAZUH_MANAGER</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>windows</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
  </client>

  <logging>
    <log_format>plain</log_format>
  </logging>

  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <localfile>
    <location>Application</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <rootcheck>
    <disabled>no</disabled>
    <windows_apps>yes</windows_apps>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_services>yes</check_services>
    <frequency>43200</frequency>
  </rootcheck>

  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <directories check_all="yes" realtime="yes">%WINDIR%</directories>
    <directories check_all="yes" realtime="yes">%PROGRAMFILES%</directories>
    <directories check_all="yes" realtime="yes">%PROGRAMFILES(X86)%</directories>
  </syscheck>

</ossec_config>
